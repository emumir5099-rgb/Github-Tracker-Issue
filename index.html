<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="bg-white px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" class="w-7" alt="GitHub Logo">
            <h1 class="font-bold text-lg text-black tracking-tight">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative flex items-center">
                <span class="absolute left-4 text-slate-400 text-sm select-none">🔍</span>
                <input 
                    id="searchInput" 
                    type="text" 
                    placeholder="Search issues..." 
                    class="pl-10 pr-4 py-2.5 w-64 md:w-80 bg-white border border-slate-200 rounded-lg text-sm text-slate-700 placeholder:text-slate-400 outline-none focus:border-[#5200FF] transition-all shadow-sm"
                >
            </div>
            <button 
                onclick="searchIssues()" 
                class="bg-[#5200FF] hover:bg-[#4100cc] text-white px-6 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-md active:scale-95"
            >
                <span class="text-lg font-light">+</span> New Issue
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div class="bg-white p-1.5 rounded-xl shadow-sm border border-gray-100 flex gap-1">
                <button onclick="showAll()" class="px-6 py-2 rounded-lg text-sm font-bold bg-[#5200FF] text-white shadow-md transition-all">All</button>
                <button onclick="showOpen()" class="px-6 py-2 rounded-lg text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all">Open</button>
                <button onclick="showClosed()" class="px-6 py-2 rounded-lg text-sm font-bold text-gray-500 hover:bg-gray-100 transition-all">Closed</button>
            </div>

            <div class="flex gap-6 text-[11px] font-bold uppercase tracking-widest text-gray-400">
                <span class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> Open
                </span>
                <span class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-[#5200FF] rounded-full"></span> Closed
                </span>
            </div>
        </div>

        <div class="mt-6">
            <p id="issueCount" class="font-bold text-sm text-slate-800">Total 0 issues found</p>
            <h2 class="text-slate-500 text-sm">Track And Manage Your Project Issue</h2>
        </div>

        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8 mb-12">
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-[24px] shadow-2xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8">
                <h2 id="modalTitle" class="text-[24px] font-bold text-[#1A1F2C] mb-4"></h2>
                
                <div class="flex items-center gap-3 mb-6">
                    <span id="modalStatus" class="bg-[#22C55E] text-white text-[12px] font-bold px-3 py-1 rounded-full uppercase"></span>
                    <span id="modalMeta" class="text-slate-400 text-[13px] font-medium"></span>
                </div>

                <div id="modalTags" class="flex gap-2 mb-8"></div>

                <p id="modalDesc" class="text-slate-600 text-[15px] leading-relaxed mb-10"></p>

                <div class="bg-[#F8FAFC] rounded-[16px] p-6 flex justify-between items-center mb-8">
                    <div>
                        <p class="text-slate-400 text-[13px] font-semibold mb-1 uppercase">Assignee:</p>
                        <p id="modalAssignee" class="text-[#1A1F2C] font-bold text-[15px]"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-slate-400 text-[13px] font-semibold mb-2 uppercase">Priority:</p>
                        <span id="modalPriority" class="bg-[#EF4444] text-white text-[11px] font-black px-4 py-1.5 rounded-lg uppercase"></span>
                    </div>
                </div>

                <div class="flex justify-end">
                    <button onclick="closeModal()" class="bg-[#5200FF] text-white px-8 py-3 rounded-xl font-bold hover:bg-[#4100cc] transition-all">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>
</html>
