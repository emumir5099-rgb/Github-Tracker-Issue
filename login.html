<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-[420px] p-10 rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white text-center">
        
        <div class="mb-8">
            <div class="w-20 h-20 bg-[#1A1F2C] rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-200">
                <img src="assets/github-logo.png" class="w-12 brightness-0 invert" alt="GitHub Logo">
            </div>
            <h1 class="text-2xl font-black text-[#1A1F2C] tracking-tight">
                Welcome Back
            </h1>
            <p class="text-slate-500 mt-2 text-sm">
                Sign in to manage your project issues
            </p>
        </div>

        <div class="space-y-5 text-left">
            <div>
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">
                    Username
                </label>
                <input 
                    id="username"
                    type="text"
                    placeholder="e.g. admin"
                    class="w-full mt-2 px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#5200FF] focus:ring-4 focus:ring-purple-50 transition-all text-slate-700 font-medium"
                >
            </div>

            <div>
                <div class="flex justify-between items-center ml-1">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">
                        Password
                    </label>
                </div>
                <input
                    id="password"
                    type="password"
                    placeholder="••••••••"
                    class="w-full mt-2 px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-[#5200FF] focus:ring-4 focus:ring-purple-50 transition-all text-slate-700 font-medium"
                >
            </div>
        </div>

        <button onclick="login()"
            class="w-full mt-8 py-4 rounded-xl text-white font-bold bg-[#5200FF] hover:bg-[#4100cc] shadow-[0_10px_20px_rgba(82,0,255,0.2)] hover:shadow-[0_12px_25px_rgba(82,0,255,0.3)] transition-all active:scale-95">
            Sign In to Dashboard
        </button>

        <div class="mt-8 pt-8 border-t border-slate-100">
            <div class="bg-purple-50 rounded-xl p-4 flex items-start gap-3 text-left">
                <span class="text-lg">💡</span>
                <div>
                    <p class="text-[12px] font-bold text-purple-700 uppercase tracking-tight">Demo Credentials</p>
                    <p class="text-[13px] text-purple-600 font-medium mt-0.5">
                        User: <span class="select-all font-bold">admin</span> | Pass: <span class="select-all font-bold">admin123</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login(){
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const btn = event.target;

            if(user === "admin" && pass === "admin123") {
                // বাটন অ্যানিমেশন
                btn.innerText = "Checking...";
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 800);
            } else {
                alert("❌ Invalid credentials! Try admin / admin123");
            }
        }

        // Enter চাপলে লগইন হবে
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>

</body>
</html>
